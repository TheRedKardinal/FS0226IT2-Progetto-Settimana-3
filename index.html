<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week Project — Settimana III</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <header>
        <!-- Titolo dell'app + sottotitolo + button tema chiaro/scuro -->
        <div>
            <h1>Videogame List</h1>
            <p>Aggiungi i libri che hai letto o che vuoi leggere</p>
        </div>
        <div>
            <button id="darkModeTog">Tema Scuro</button>
        </div>
    </header>

    <main>

        <section class="form">
            <!-- Form di inserimento di nuovi elementi -->
            <div>
                <h4>Aggiungi un gioco</h4>
                <form>
                    <input type="text" id="title" placeholder="Titolo" />
                    <input type="text" id="console" placeholder="Console" />

                    <select name="categories" id="categories">
                        <option value="" selected>Seleziona</option>
                        <option value="Azione e Avventura">&nbsp;&nbsp;Azione e Avventura</option>
                        <option value="Platform">&nbsp;&nbsp;Platform</option>
                        <option value="Picchiaduro">&nbsp;&nbsp;Picchiaduro</option>
                        <option value="A scorrimento">&nbsp;&nbsp;A scorrimento</option>
                        <option value="Stealth">&nbsp;&nbsp;Stealth</option>
                        <option value="Sparatutto (FPS/TPS)">&nbsp;&nbsp;Sparatutto (FPS/TPS)</option>
                        <option value="Giochi di Ruolo">&nbsp;&nbsp;Giochi di Ruolo</option>
                        <option value="Strategia">&nbsp;&nbsp;Strategia</option>
                        <option value="Simulazione e Sport">&nbsp;&nbsp;Simulazione e Sport</option>
                    </select>

                    <select name="filterList" id="filterList">
                        <option value="" selected>Seleziona</option>
                        <option value="daGiocare">&nbsp;&nbsp;Da giocare</option>
                        <option value="giocato">&nbsp;&nbsp;Giocato</option>
                        <option value="tutti">&nbsp;&nbsp;Tutti</option>
                    </select>

                    <button type="submit">Aggiungi</button>
                </form>
            </div>
        </section>

        <section class="controlli">
            <!-- Ricerca live, filtro (select), ordinamento -->
            <div>
                <form>
                    <input type="text" id="search" placeholder="Cerca per titolo o console" />
                    <select name="isPlayedSearch" id="isPlayedSearch">
                        <option value="" selected>Seleziona</option>
                        <option value="daGiocare">&nbsp;&nbsp;Da giocare</option>
                        <option value="giocato">&nbsp;&nbsp;Giocato</option>
                        <option value="tutti">&nbsp;&nbsp;Tutti</option>
                    </select>
                    <select name="categorySearch" id="categorySearch">
                        <option value="">Seleziona</option>
                        <option value="aZ">&nbsp;&nbsp;A -> Z</option>
                        <option value="zA">&nbsp;&nbsp;Z &lt;- A </option>

                        <option value="Azione e Avventura">&nbsp;&nbsp;Azione e Avventura</option>
                        <option value="Platform">&nbsp;&nbsp;Platform</option>
                        <option value="Picchiaduro">&nbsp;&nbsp;Picchiaduro</option>
                        <option value="A scorrimento">&nbsp;&nbsp;A scorrimento</option>
                        <option value="Stealth">&nbsp;&nbsp;Stealth</option>
                        <option value="Sparatutto (FPS/TPS)">&nbsp;&nbsp;Sparatutto (FPS/TPS)</option>
                        <option value="Gioco di Ruolo">&nbsp;&nbsp;Giochi di Ruolo</option>
                        <option value="Strategia">&nbsp;&nbsp;Strategia</option>
                        <option value="Simulazione e Sport">&nbsp;&nbsp;Simulazione e Sport</option>
                    </select>
                </form>
            </div>
        </section>

        <section class="statistiche">
            <!-- Conteggi e/o barre orizzontali -->
            <div>
                <div class="total">
                    <span>0</span>
                    <p>Totale</p>
                </div>

                <div class="played">
                    <span>0</span>
                    <p>Letti</p>
                </div>

                <div class="toPlay">
                    <span>0</span>
                    <p>Da leggere</p>
                </div>

                <div class="barBox">
                    <div class="barDiv">
                        <div class="bar"></div>
                    </div>
                    <p>Percentuale letti</p>
                </div>

            </div>
        </section>

        <section class="lista">
            <!-- Container che render() ricostruisce a ogni cambio di stato -->
        </section>

        <div id="notifica"></div>

    </main>

    <footer>
        <!-- Autore, anno -->
        <div class="footer-div">
            <h5>&copy; Claudio Giasi, 2026</h5>
            <p>Week Project — Settimana III</p>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>

</html>
